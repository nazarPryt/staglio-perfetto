appId: com.nazarpryt.staglioperfetto
---
# Biga recipe that triggers "biga water exceeds total water" error:
# prefermentFlour=80%, prefermentHydration=70%, water=500g
# With 1kg flour: bigaFlour=800, bigaWater=560 > totalWater=500
- waitForAnimationToEnd
- tapOn:
    point: "50%,50%"
- tapOn:
    id: "new_recipe_btn"
- tapOn:
    id: "recipe_name_input"
- inputText: "E2E Biga Water Error"
- hideKeyboard
- tapOn:
    id: "method_biga"
- tapOn:
    id: "preferment-flour-pct"
- eraseText
- inputText: "80"
- tapOn:
    id: "preferment-hydration"
- eraseText
- inputText: "70"
- scrollUntilVisible:
    element:
      id: "grams-water"
    direction: DOWN
- tapOn:
    id: "grams-water"
- eraseText
- inputText: "500"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "save_recipe_btn"
    direction: DOWN
- tapOn:
    id: "save_recipe_btn"
- waitForAnimationToEnd
