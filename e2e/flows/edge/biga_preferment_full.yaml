appId: com.nazarpryt.staglioperfetto
---
# ⚠️ preferment 100% → all flour in step1, step2 has no flour row
# bigaFlour=1000, finalFlour=0 → step2_label_flour_grams absent
# bigaWater=450 ≤ totalWater=650 ✓, bigaYeast=2 ≤ totalYeast=3 ✓
# totalDough=round1(1000+650+3+25)=1678g
- launchApp
- runFlow: ../../helpers/setup_biga_preferment_full_recipe.yaml

- tapOn:
    id: "tab_calculator"
- tapOn:
    id: "recipe_picker"
- tapOn:
    id: "recipe_option_E2E_Biga_Pref_Full"
- tapOn:
    id: "mode_by_flour"
- tapOn:
    id: "calculator_input"
- inputText: "1"

- scrollUntilVisible:
    element:
      id: "step1_label_flour_grams"
    direction: DOWN

- assertVisible:
    id: "step1_label_flour_grams"
- assertVisible:
    text: "1000g"

- scrollUntilVisible:
    element:
      id: "step2_label"
    direction: DOWN

- assertVisible:
    id: "step2_label"
# finalFlour=0 → flour row must NOT be rendered in step2
- assertNotVisible:
    id: "step2_label_flour_grams"

- scrollUntilVisible:
    element:
      id: "result_total_dough"
    direction: DOWN

- assertVisible:
    id: "result_total_dough"
- assertVisible:
    text: "1678g"
